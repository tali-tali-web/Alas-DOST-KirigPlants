<!DOCTYPE html>
<html>
<head>
    <title>Plant Signal Monitor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden">

<div class="flex h-full">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">

        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">
                Devices
            </h1>
        </div>

        <div
            id="device-list"
            class="flex-1 overflow-y-auto p-2 space-y-2"
        >
            <!-- Devices inserted by JS -->
        </div>

    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6 overflow-auto">

        <div class="mb-6">

            <h1
                id="device-title"
                class="text-3xl font-bold"
            >
                No Device Selected
            </h1>

            <p
                id="status"
                class="text-gray-400 mt-2"
            >
                Waiting for selection...
            </p>

        </div>

        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 mb-4">

            <div class="flex flex-col lg:flex-row gap-3 lg:items-end">

                <div class="flex-1">
                    <label
                        for="session-label"
                        class="block text-xs uppercase text-gray-400 mb-2"
                    >
                        Recording Label
                    </label>
                    <input
                        id="session-label"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white"
                        value="control"
                    >
                </div>

                <div class="flex gap-2">
                    <button
                        id="label-control"
                        class="px-3 py-2 rounded-lg bg-gray-700 hover:bg-gray-600"
                    >
                        Control
                    </button>
                    <button
                        id="label-stimulus"
                        class="px-3 py-2 rounded-lg bg-gray-700 hover:bg-gray-600"
                    >
                        Stimulus
                    </button>
                </div>

                <div class="flex gap-2">
                    <button
                        id="start-session"
                        class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-500 font-bold"
                    >
                        Start
                    </button>
                    <button
                        id="stop-session"
                        class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 font-bold"
                    >
                        Stop
                    </button>
                </div>

            </div>

            <div
                id="recording-status"
                class="text-sm text-gray-400 mt-3"
            >
                No active recording
            </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="text-xs uppercase text-gray-400">
                    Prediction
                </div>
                <div
                    id="prediction-label"
                    class="text-2xl font-bold mt-2"
                >
                    -
                </div>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="text-xs uppercase text-gray-400">
                    Confidence
                </div>
                <div
                    id="prediction-confidence"
                    class="text-2xl font-bold mt-2"
                >
                    -
                </div>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="text-xs uppercase text-gray-400">
                    Window
                </div>
                <div
                    id="prediction-window"
                    class="text-2xl font-bold mt-2"
                >
                    -
                </div>
            </div>

        </div>

        <div class="bg-gray-800 rounded-xl p-4">

            <canvas id="signalChart"></canvas>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
